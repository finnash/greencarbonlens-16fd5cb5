version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      tanstack:
        patterns: ["@tanstack/*"]
      radix:
        patterns: ["@radix-ui/*"]
      ai-sdk:
        patterns: ["ai", "@ai-sdk/*"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
