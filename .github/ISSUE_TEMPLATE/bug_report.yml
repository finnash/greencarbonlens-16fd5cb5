name: Bug report
description: Something is broken or behaves unexpectedly
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser / device
      placeholder: Chrome 126, iPhone 15
  - type: textarea
    id: logs
    attributes:
      label: Console / network logs
      render: shell
